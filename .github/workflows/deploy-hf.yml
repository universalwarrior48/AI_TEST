name: Deploy to HF Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ HF_TOKEN is missing"
            exit 1
          else
            echo "✅ HF_TOKEN is present"
          fi

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          REPO="UniversalWarrior48/AI_TEST"
          SPACE_DIR="space"

          echo "Cloning HF Space..."
          git clone https://huggingface.co/spaces/$REPO $SPACE_DIR

          echo "Syncing files..."
          rsync -av \
            --exclude .git \
            --exclude .github \
            --exclude $SPACE_DIR \
            ./ $SPACE_DIR/

          cd $SPACE_DIR

          git config user.email "universalwarrior48@gmail.com"
          git config user.name "Sagar Pohekar"

          echo "Staging changes..."
          git add .

          echo "Committing..."
          git commit -m "Deploy from GitHub" || echo "No changes to commit"

          echo "Pushing to HF..."
          git push https://oauth2:$HF_TOKEN@huggingface.co/spaces/$REPO main

          echo "✅ Deployment complete"