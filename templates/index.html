<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Design Lab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>🏗️ System Design Lab</h1>
            <div class="controls">
                <button id="btn-start" class="btn btn-primary">▶ Start</button>
                <button id="btn-stop" class="btn btn-danger">⏹ Stop</button>
                <button id="btn-clear" class="btn btn-secondary">🗑 Clear</button>
                <select id="template-select" class="select-input">
                    <option value="">Load Template...</option>
                </select>
                <button id="btn-export" class="btn btn-secondary">💾 Export</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Component Palette -->
            <aside class="palette">
                <h3>Components</h3>
                <div class="component-list">
                    <div class="palette-item" draggable="true" data-type="client">
                        <span class="icon">🖥️</span> Client
                    </div>
                    <div class="palette-item" draggable="true" data-type="loadbalancer">
                        <span class="icon">⚖️</span> Load Balancer
                    </div>
                    <div class="palette-item" draggable="true" data-type="server">
                        <span class="icon">🖧</span> Server
                    </div>
                    <div class="palette-item" draggable="true" data-type="database">
                        <span class="icon">🗄️</span> Database
                    </div>
                    <div class="palette-item" draggable="true" data-type="cache">
                        <span class="icon">⚡</span> Cache
                    </div>
                    <div class="palette-item" draggable="true" data-type="apigateway">
                        <span class="icon">🚪</span> API Gateway
                    </div>
                    <div class="palette-item" draggable="true" data-type="queue">
                        <span class="icon">📬</span> Message Queue
                    </div>
                    <div class="palette-item" draggable="true" data-type="cdn">
                        <span class="icon">🌐</span> CDN
                    </div>
                </div>
                
                <h3>Tools</h3>
                <div class="tool-list">
                    <button id="btn-connect" class="btn btn-tool">🔗 Connect Mode</button>
                    <button id="btn-pan" class="btn btn-tool active">✋ Pan Mode</button>
                </div>
            </aside>

            <!-- Canvas -->
            <main class="canvas-container">
                <div id="canvas-wrapper">
                    <svg id="connections-layer"></svg>
                    <div id="components-layer"></div>
                    <div id="particles-layer"></div>
                </div>
            </main>

            <!-- Properties Panel -->
            <aside class="properties-panel" id="properties-panel">
                <h3>Properties</h3>
                <div id="properties-content">
                    <p class="empty-state">Select a component to edit properties</p>
                </div>
            </aside>
        </div>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span id="status-text">Ready</span>
            <span id="metrics-summary">Components: 0 | Connections: 0</span>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/component_types.js') }}"></script>
    <script src="{{ url_for('static', filename='js/templates.js') }}"></script>
    <script src="{{ url_for('static', filename='js/simulation_engine.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
